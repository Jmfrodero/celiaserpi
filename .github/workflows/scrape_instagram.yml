name: Actualizar Feed de Comunidad

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write # Allows pushing the updated json to the repository

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraping script
        run: python scrape_instagram.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add instagram.json
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes in instagram.json"
          else
            git commit -m "chore: auto-update community feed data [skip ci]"
            git push
          fi
